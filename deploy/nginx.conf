# Reverse proxy for the Gunicorn-served Django app.
# Static files are served by WhiteNoise from within the app (compressed +
# far-future cache headers), so nginx simply proxies all traffic.
#
# For a bare-metal/VPS setup, put this in /etc/nginx/sites-available/ and add a
# TLS server block (see the README) terminated by Certbot.

upstream django {
    server web:8000;      # docker-compose service name; use 127.0.0.1:8000 on a VPS
}

server {
    listen 80;
    server_name _;

    client_max_body_size 30M;   # generous headroom; images are processed client-side

    # Gzip text assets (WhiteNoise also ships pre-compressed variants).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
