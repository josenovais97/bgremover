{% extends 'base.html' %}
{% block title %}Something went wrong — ClearBG{% endblock %}
{% block content %}
<section class="max-w-lg mx-auto text-center py-16 space-y-6">
    <div class="mx-auto w-20 h-20 grid place-items-center rounded-2xl bg-red-500/10 text-red-500 text-4xl">
        <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
    </div>
    <h1 class="text-4xl font-extrabold">500</h1>
    <p class="text-gray-600 dark:text-gray-300">An unexpected error occurred on our end. Please try again in a moment.</p>
    <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-primary to-fuchsia-500 hover:brightness-110 text-white font-medium rounded-xl shadow-lg shadow-primary/30 transition-transform hover:scale-105">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to the remover
    </a>
</section>
{% endblock %}
