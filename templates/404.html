{% extends 'base.html' %}
{% block title %}Page not found — ClearBG{% endblock %}
{% block content %}
<section class="max-w-lg mx-auto text-center py-16 space-y-6">
    <div class="mx-auto w-20 h-20 grid place-items-center rounded-2xl bg-primary/10 text-primary text-4xl">
        <i class="fa-solid fa-compass" aria-hidden="true"></i>
    </div>
    <h1 class="text-4xl font-extrabold">404</h1>
    <p class="text-gray-600 dark:text-gray-300">We couldn't find that page. It may have moved or never existed.</p>
    <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-primary to-primaryHover hover:brightness-110 text-white font-medium rounded-xl shadow-lg shadow-primary/30 transition-transform hover:scale-105">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to the remover
    </a>

    <div class="pt-4">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">Or jump to a tool:</p>
        <nav class="flex flex-wrap justify-center gap-2" aria-label="Tools">
            {% for item in tool_nav %}
            <a href="{{ item.url }}" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm border border-gray-200/70 dark:border-gray-800/70 hover:border-primary/60 hover:text-primary transition-colors">
                <i class="{{ item.icon }} text-xs" aria-hidden="true"></i>{{ item.label }}
            </a>
            {% endfor %}
        </nav>
    </div>
</section>
{% endblock %}
