<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#D946EF"/>
    </linearGradient>
    <clipPath id="chipM"><rect x="36" y="25" width="14" height="14" rx="3"/></clipPath>
  </defs>
  <!-- Full-bleed gradient (no rounded corners): the OS applies its own mask -->
  <rect width="64" height="64" fill="url(#g)"/>
  <!-- Mark scaled into the maskable safe zone (~80% circle) and centred -->
  <g transform="translate(32,32) scale(0.8) translate(-28.25,-32)">
    <path d="M36.2 18.9 A16 16 0 1 0 36.2 45.1" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <g clip-path="url(#chipM)">
      <rect x="36" y="25" width="14" height="14" fill="#ffffff"/>
      <rect x="36" y="25" width="7" height="7" fill="#c7b8f2"/>
      <rect x="43" y="32" width="7" height="7" fill="#c7b8f2"/>
    </g>
  </g>
</svg>
