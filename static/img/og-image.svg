<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#D946EF"/>
    </linearGradient>
    <clipPath id="ogchip"><rect x="36" y="25" width="14" height="14" rx="3"/></clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="260" fill="#4F46E5" opacity="0.18"/>

  <!-- Brand lockup: ClearBG logo mark + wordmark + domain -->
  <g transform="translate(90,70)">
    <rect width="96" height="96" rx="24" fill="url(#accent)"/>
    <g transform="scale(1.5)">
      <path d="M36.2 18.9 A16 16 0 1 0 36.2 45.1" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
      <g clip-path="url(#ogchip)">
        <rect x="36" y="25" width="14" height="14" fill="#ffffff"/>
        <rect x="36" y="25" width="7" height="7" fill="#b3a4e6"/>
        <rect x="43" y="32" width="7" height="7" fill="#b3a4e6"/>
      </g>
    </g>
    <text x="120" y="52" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">ClearBG</text>
    <text x="122" y="88" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#a5b4fc">clearbg.pt</text>
  </g>

  <text x="90" y="358" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Free AI Background Remover</text>
  <text x="90" y="426" font-family="Inter, Arial, sans-serif" font-size="33" fill="#c7d2fe">No watermark · Full resolution · 100% private in your browser</text>
  <text x="90" y="500" font-family="Inter, Arial, sans-serif" font-size="29" fill="#818cf8">Drop an image → get a transparent PNG in seconds</text>
</svg>
